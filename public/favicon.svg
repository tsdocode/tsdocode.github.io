<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="7" fill="#111111"/>

  <!-- Waveform bars (centered, symmetric) -->
  <!-- bar 1 -->
  <rect x="5"  y="13" width="3" height="6"  rx="1.5" fill="white" opacity="0.5"/>
  <!-- bar 2 -->
  <rect x="10" y="10" width="3" height="12" rx="1.5" fill="white" opacity="0.75"/>
  <!-- bar 3 (tallest, center) -->
  <rect x="15" y="7"  width="3" height="18" rx="1.5" fill="white"/>
  <!-- bar 4 -->
  <rect x="20" y="10" width="3" height="12" rx="1.5" fill="white" opacity="0.75"/>
  <!-- bar 5 -->
  <rect x="25" y="13" width="3" height="6"  rx="1.5" fill="white" opacity="0.5"/>
</svg>
